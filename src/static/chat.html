<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高考志愿智能规划师</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:#f0f2f5;height:100vh;display:flex;flex-direction:column}
.header{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);color:#fff;padding:14px 20px;text-align:center;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.header h1{font-size:18px;font-weight:600;letter-spacing:1px}
.header span{font-size:12px;opacity:.65}
.chat-wrap{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.msg{display:flex;gap:10px;max-width:85%;animation:fadeIn .2s ease}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.assistant{align-self:flex-start}
.msg .avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.msg.user .avatar{background:#0f3460}
.msg.assistant .avatar{background:linear-gradient(135deg,#e84545,#903749)}
.msg .bubble{padding:12px 16px;border-radius:16px;line-height:1.65;font-size:14px;word-break:break-word;white-space:pre-wrap}
.msg.user .bubble{background:#0f3460;color:#fff;border-bottom-right-radius:4px}
.msg.assistant .bubble{background:#fff;color:#333;border-bottom-left-radius:4px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.msg.assistant .bubble p{margin:4px 0}
.msg.assistant .bubble h1,.msg.assistant .bubble h2,.msg.assistant .bubble h3{font-size:15px;margin:10px 0 6px;color:#1a1a2e}
.msg.assistant .bubble ul,.msg.assistant .bubble ol{padding-left:20px;margin:6px 0}
.msg.assistant .bubble li{margin:3px 0}
.msg.assistant .bubble strong{color:#e84545}
.tool-badge{display:inline-block;background:#fff3f3;color:#e84545;font-size:11px;padding:2px 8px;border-radius:10px;margin:2px 4px;border:1px solid #fdd}
.typing{display:flex;gap:4px;padding:6px 0}
.typing-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#bbb;animation:typingBounce 1.4s infinite ease-in-out}
.typing-dot:nth-child(1){animation-delay:0s}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes typingBounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.input-wrap{background:#fff;padding:12px 16px;border-top:1px solid #e8e8e8;display:flex;gap:10px;align-items:flex-end;flex-shrink:0}
.input-wrap textarea{flex:1;border:1px solid #d9d9d9;border-radius:12px;padding:10px 14px;font-size:14px;resize:none;outline:none;font-family:inherit;min-height:44px;max-height:120px;line-height:1.5}
.input-wrap textarea:focus{border-color:#0f3460;box-shadow:0 0 0 2px rgba(15,52,96,.1)}
.input-wrap button{background:linear-gradient(135deg,#0f3460,#16213e);color:#fff;border:none;border-radius:12px;padding:10px 22px;font-size:14px;cursor:pointer;font-weight:600;transition:all .2s;white-space:nowrap}
.input-wrap button:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(15,52,96,.3)}
.input-wrap button:active{transform:scale(.97)}
.input-wrap button:disabled{opacity:.5;cursor:not-allowed;transform:none}
.quick-actions{display:flex;gap:8px;padding:8px 16px 0;flex-wrap:wrap;flex-shrink:0}
.quick-btn{background:#fff;border:1px solid #d9d9d9;border-radius:16px;padding:6px 14px;font-size:12px;cursor:pointer;color:#555;transition:all .2s}
.quick-btn:hover{background:#0f3460;color:#fff;border-color:#0f3460}
.welcome-card{text-align:center;padding:40px 20px;margin:20px 0}
.welcome-card h2{font-size:20px;color:#1a1a2e;margin-bottom:8px}
.welcome-card p{color:#999;font-size:13px;line-height:1.8}
@media(max-width:600px){.msg{max-width:95%}}
</style>
</head>
<body>

<div class="header">
  <h1>高考志愿智能规划师</h1>
  <span>AI-Powered Gaokao Advisor</span>
</div>

<div class="quick-actions" id="quickActions">
  <button class="quick-btn" onclick="quickSend('我孩子高三，怎么开始？')">怎么开始？</button>
  <button class="quick-btn" onclick="quickSend('什么是五阶段流程？')">五阶段流程</button>
  <button class="quick-btn" onclick="quickSend('需要准备什么信息？')">需要准备什么</button>
  <button class="quick-btn" onclick="newSession()">新会话</button>
</div>

<div class="chat-wrap" id="chatWrap">
  <div class="welcome-card">
    <h2>你好！我是高考志愿智能规划师</h2>
    <p>输入<b>"高考"</b>即可启动五阶段志愿规划流程<br>也可以直接告诉我你的情况，我会一步步引导你</p>
  </div>
</div>

<div class="input-wrap">
  <textarea id="userInput" rows="1" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)" onkeydown="handleKey(event)"></textarea>
  <button id="sendBtn" onclick="send()">发送</button>
</div>

<script>
const STREAM_API = '/stream';

let sessionId = crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36);
let isStreaming = false;

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
}

function newSession() {
  sessionId = crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36);
  document.getElementById('chatWrap').innerHTML = `
    <div class="welcome-card">
      <h2>新会话已开始</h2>
      <p>输入<b>"高考"</b>启动五阶段志愿规划流程</p>
    </div>`;
}

function quickSend(msg) {
  document.getElementById('userInput').value = msg;
  send();
}

function scrollBottom() {
  const wrap = document.getElementById('chatWrap');
  wrap.scrollTop = wrap.scrollHeight;
}

function escapeHTML(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function renderMarkdown(text) {
  if (!text) return '';

  let html = escapeHTML(text);

  // Bold
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // Italic
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Tool badges: [工具调用: xxx]
  html = html.replace(/\[工具调用:\s*(.+?)\]/g, '<span class="tool-badge">$1</span>');

  // Headings
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // Horizontal rules
  html = html.replace(/^---$/gm, '<hr>');

  // Unordered list items
  html = html.replace(/^[*-] (.+)$/gm, '<li>$1</li>');
  // Numbered list items
  html = html.replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>');
  // Wrap consecutive <li> in <ul>
  html = html.replace(/(<li>.*?<\/li>\s*)+/g, '<ul>$&</ul>');

  // Double newline → paragraph break
  html = html.replace(/\n\n/g, '</p><p>');
  // Single newline → line break
  html = html.replace(/\n/g, '<br>');

  return '<p>' + html + '</p>';
}

function createAssistantBubble() {
  const wrap = document.getElementById('chatWrap');
  const welcome = wrap.querySelector('.welcome-card');
  if (welcome) welcome.remove();

  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.dataset.streaming = 'true';
  div.innerHTML = '<div class="avatar"></div><div class="bubble"><div class="typing"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div></div>';
  wrap.appendChild(div);
  scrollBottom();
  return div;
}

function finishStreamingBubbles() {
  document.querySelectorAll('.msg.assistant[data-streaming="true"]').forEach(m => {
    delete m.dataset.streaming;
  });
}

async function send() {
  const input = document.getElementById('userInput');
  const btn = document.getElementById('sendBtn');
  const msg = input.value.trim();
  if (!msg || isStreaming) return;

  input.value = '';
  input.style.height = 'auto';
  isStreaming = true;
  btn.disabled = true;

  // Show user message
  const wrap = document.getElementById('chatWrap');
  const welcome = wrap.querySelector('.welcome-card');
  if (welcome) welcome.remove();

  const userDiv = document.createElement('div');
  userDiv.className = 'msg user';
  userDiv.innerHTML = '<div class="avatar"></div><div class="bubble">' + escapeHTML(msg) + '</div>';
  wrap.appendChild(userDiv);
  scrollBottom();

  // Create streaming bubble
  let streamBubble = createAssistantBubble();
  let fullContent = '';

  try {
    const resp = await fetch(STREAM_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg, session_id: sessionId }),
    });

    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.detail || 'HTTP ' + resp.status);
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const payload = line.slice(6).trim();
        if (payload === '[DONE]') break;

        try {
          const parsed = JSON.parse(payload);
          if (parsed.type === 'ai' && parsed.content) {
            fullContent += parsed.content;
            // Update existing streaming bubble
            if (!streamBubble || !document.contains(streamBubble)) {
              streamBubble = createAssistantBubble();
            }
            const bubble = streamBubble.querySelector('.bubble');
            bubble.innerHTML = renderMarkdown(fullContent);
            scrollBottom();
          }
        } catch (e) {}
      }
    }

  } catch (err) {
    if (!streamBubble || !document.contains(streamBubble)) {
      streamBubble = createAssistantBubble();
    }
    streamBubble.querySelector('.bubble').innerHTML = '<p style="color:#e84545">请求失败: ' + escapeHTML(err.message) + '</p>';
  } finally {
    finishStreamingBubbles();
    isStreaming = false;
    btn.disabled = false;
    input.focus();
    scrollBottom();
  }
}

// Auto-resize textarea
document.getElementById('userInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

document.getElementById('userInput').focus();
</script>
</body>
</html>
